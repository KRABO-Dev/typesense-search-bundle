services:
  _defaults:
    autowire: true
    autoconfigure: true
  Krabo\TypesenseSearchBundle\Controller\AnalyticsController: ~  
  Krabo\TypesenseSearchBundle\Controller\IsotopeProductController:
    public: true
  Krabo\TypesenseSearchBundle\Cron\IndexIsoProductsCron:
    public: true
    tags:
      - { name: 'contao.cronjob', 'interval': '15 0 * * *' }
  Krabo\TypesenseSearchBundle\Cron\ClearAnalyticsCron:
    public: true
    tags:
      - { name: 'contao.cronjob', 'interval': 'daily' }
  Krabo\TypesenseSearchBundle\Indexer:
    tags:
      - { name: 'contao.search_indexer' }